<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />

  {% seo %}
</head>
<body>

  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <!-- NAV -->
  <header class="site-header" id="site-header">
    <nav class="nav-inner">
      <a class="nav-logo" href="{{ '/' | relative_url }}">
        <span class="logo-bracket">[</span>
        <span class="logo-text">HK</span>
        <span class="logo-bracket">]</span>
      </a>

      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}#about">about</a></li>
        <li><a href="{{ '/' | relative_url }}#skills">skills</a></li>
        <li><a href="{{ '/' | relative_url }}#projects">projects</a></li>
        <li><a href="{{ '/' | relative_url }}#blog">blog</a></li>
        <li><a href="{{ '/' | relative_url }}#contact" class="nav-cta">contact</a></li>
      </ul>

      <button class="nav-toggle" aria-label="Toggle menu" id="navToggle">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <!-- PAGE CONTENT -->
  <main id="main-content">
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">[HK]</span>
        <p class="footer-tagline">{{ site.tagline }}</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/{{ site.author.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:{{ site.author.email }}">Email</a>
      </div>
      <p class="footer-copy">
        <span class="mono">// </span>Built with Jekyll · Hosted on GitHub Pages
      </p>
    </div>
  </footer>

  <script src="{{ '/script.js' | relative_url }}"></script>
</body>
</html>
